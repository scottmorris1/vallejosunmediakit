<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vallejo Sun Subscription Thermometer</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --border: #000000;
      --text: #000000;
      --muted: #555555;
      --accent: #fed700;
      --accent-dark: #e6c200;
      --track: #eeeeee;
      --fill: linear-gradient(180deg, #fed700 0%, #e6c200 100%);
      --shadow: 0 6px 20px rgba(0,0,0,0.08);
      --radius: 12px;
      --thermo-width: 60px;
      --thermo-height: 260px;
      --bulb-size: 80px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: transparent;
    }

    .widget {
      width: min(100%, 900px);
      margin: 0 auto;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 20px;
      align-items: center;
    }

    /* Horizontal ad unit (970x250 style) */
    .ad-horizontal {
      width: 100%;
      max-width: 970px;
      height: 250px;
      grid-template-columns: 120px 1fr;
      padding: 16px;
    }

    .ad-horizontal .thermo {
      height: 180px;
      width: 40px;
    }

    .ad-horizontal .thermo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 10px 6px 10px 0;
    }

    .ad-horizontal .ticks {
      inset: 0;
    }

    .ad-horizontal .tick {
      position: absolute;
      right: 6px;
      transform: translateY(50%);
      font-size: 10px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ad-horizontal .tick::before {
      content: "";
      display: block;
      width: 8px;
      height: 2px;
      background: #333;
      border-radius: 2px;
    }

    .ad-horizontal .bulb {
      width: 60px;
      height: 60px;
    }

    .ad-horizontal h1 {
      font-size: 20px;
    }

    .ad-horizontal .subhead {
      font-size: 14px;
    }

    .ad-horizontal .stats {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .ad-horizontal .cta {
      padding: 10px 14px;
      font-size: 14px;
    }

    /* Vertical ad unit (300x600 style) */
    .ad-vertical {
      width: 300px;
      height: 600px;
      grid-template-columns: 1fr;
      text-align: center;
    }

    .ad-vertical .thermo {
      height: 220px;
    }

    .ad-vertical .thermo-wrap {
      padding-right: 0;
    }

    .ad-vertical .ticks {
      inset: 0;
    }

    .ad-vertical .stats {
      grid-template-columns: 1fr;
    }

    .thermo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 10px 0;
    }

    .thermo {
      position: relative;
      width: var(--thermo-width);
      height: var(--thermo-height);
      border-radius: 999px;
      background: var(--track);
      border: 6px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.35);
    }

    .thermo::after {
      content: "";
      position: absolute;
      top: 10px;
      left: 14px;
      width: 14px;
      height: calc(100% - 20px);
      border-radius: 999px;
      background: rgba(255,255,255,0.35);
      pointer-events: none;
    }

    .fill {
      width: 100%;
      height: 0%;
      background: var(--fill);
      transition: height 900ms ease;
      position: relative;
    }

    .fill::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 12px;
      background: rgba(255,255,255,0.28);
    }

    .bulb {
      margin-top: -18px;
      width: var(--bulb-size);
      height: var(--bulb-size);
      border-radius: 50%;
      background: var(--fill);
      border: 6px solid var(--border);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.28);
    }

    .ticks {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .tick {
      position: absolute;
      right: 6px;
      transform: translateY(50%);
      font-size: 10px;
      color: #333333;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .tick::before {
      content: "";
      display: block;
      width: 8px;
      height: 2px;
      background: #333333;
      border-radius: 2px;
    }

    .content {
      min-width: 0;
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      margin-bottom: 14px;
      text-decoration: none;
    }

    .brand-logo {
      display: block;
      width: auto;
      max-width: 240px;
      max-height: 54px;
    }

    .ad-horizontal .brand-link {
      margin-bottom: 10px;
    }

    .ad-horizontal .brand-logo {
      max-width: 170px;
      max-height: 36px;
    }

    .ad-vertical .brand-link {
      justify-content: center;
      margin-bottom: 12px;
    }

    .ad-vertical .brand-logo {
      max-width: 180px;
      max-height: 42px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-dark);
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
    }

    .subhead {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.45;
      max-width: 36ch;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 800;
      line-height: 1;
    }

    .progress-bar {
      width: 100%;
      height: 18px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      margin-top: 22px;
      border: 1px solid var(--border);
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #fed700 0%, #e6c200 100%);
      transition: width 900ms ease;
      border-radius: 999px;
    }

    .footer-note {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .meta-row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .left-badge,
    .updated-badge {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #ffffff;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .left-badge strong {
      margin-right: 4px;
    }

    .goal-reached .left-badge {
      background: var(--accent);
    }

    .near-goal .cta {
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .cta {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #000000;
      text-decoration: none;
      font-weight: 800;
    }

    .cta:hover {
      background: var(--accent-dark);
    }

    .error {
      margin-top: 12px;
      color: #991b1b;
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .widget {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .thermo-wrap {
        padding-top: 8px;
        padding-right: 0;
      }
      .ticks {
        inset: 0;
      }
      .tick {
        right: 4px;
        font-size: 9px;
      }
      .tick::before {
        width: 6px;
      }
      .subhead {
        margin-left: auto;
        margin-right: auto;
      }
      .stats {
        grid-template-columns: 1fr;
      }
      .meta-row {
        justify-content: center;
      }
      .cta {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <section class="widget" id="widget" aria-label="Vallejo Sun April subscription drive progress">
    <div class="thermo-wrap">
      <div class="thermo" aria-hidden="true">
        <div class="fill" id="thermoFill"></div>
        <div class="ticks" id="ticks"></div>
      </div>
      <div class="bulb" aria-hidden="true"></div>
    </div>

    <div class="content">
      <a class="brand-link" id="brandLink" href="https://www.vallejosun.com/" target="_blank" rel="noopener noreferrer" aria-label="Visit Vallejo Sun">
        <img class="brand-logo" id="brandLogo" src="https://www.vallejosun.com/content/images/2026/03/VallejoSunlogoidea6-1000px-transparent.png" alt="Vallejo Sun" />
      </a>
      <p class="eyebrow">Spring Subscription Drive</p>
      <h1 id="headline">Help us reach 100 new paid subscribers in April</h1>
      <p class="subhead" id="subhead">Local news depends on local readers. Track our progress and help push us to the finish line.</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">New subscribers</div>
          <div class="stat-value" id="currentValue">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Goal</div>
          <div class="stat-value" id="goalValue">100</div>
        </div>
        <div class="stat">
          <div class="stat-label">Progress</div>
          <div class="stat-value" id="percentValue">0%</div>
        </div>
      </div>

      <div class="progress-bar" aria-hidden="true">
        <div class="progress-bar-fill" id="barFill"></div>
      </div>

      <p class="footer-note" id="footerNote">100 subscribers to go.</p>
      <div class="meta-row">
        <div class="left-badge" id="leftBadge"><strong>100</strong> left</div>
        <div class="updated-badge" id="updatedBadge">Updated today</div>
      </div>
      <a class="cta" id="ctaLink" href="https://www.vallejosun.com/subscribe" target="_blank" rel="noopener noreferrer">Become a subscriber</a>
      <div class="error" id="errorBox" hidden></div>
    </div>
  </section>

  <script>
    const CONFIG = {
      // Replace with your published CSV URL from Google Sheets.
      // Example:
      // https://docs.google.com/spreadsheets/d/e/XXXXXXXXXXXX/pub?gid=0&single=true&output=csv
      sheetCsvUrl: "PASTE_YOUR_PUBLISHED_CSV_URL_HERE",

      // Which row in the CSV to use. Default assumes the first data row.
      dataRowIndex: 0,

      // Optional text / branding tweaks
      goalLabel: "100",
      subscribeUrl: "https://www.vallejosun.com/subscribe",
      title: "Help us reach 100 new paid subscribers in April",
      subtitle: "Local news depends on local readers. Track our progress and help push us to the finish line.",
      brandUrl: "https://www.vallejosun.com/",
      brandLogoUrl: "https://www.vallejosun.com/content/images/2026/03/VallejoSunlogoidea6-1000px-transparent.png",

      // Expected CSV headers (first row)
      columns: {
        current: "current",
        goal: "goal",
        monthLabel: "month_label",
        headline: "headline",
        subhead: "subhead",
        ctaUrl: "cta_url",
        ctaText: "cta_text",
        updatedAt: "updated_at"
      }
    };

    const els = {
      currentValue: document.getElementById("currentValue"),
      goalValue: document.getElementById("goalValue"),
      percentValue: document.getElementById("percentValue"),
      footerNote: document.getElementById("footerNote"),
      thermoFill: document.getElementById("thermoFill"),
      barFill: document.getElementById("barFill"),
      headline: document.getElementById("headline"),
      subhead: document.getElementById("subhead"),
      ctaLink: document.getElementById("ctaLink"),
      errorBox: document.getElementById("errorBox"),
      ticks: document.getElementById("ticks"),
      leftBadge: document.getElementById("leftBadge"),
      updatedBadge: document.getElementById("updatedBadge"),
      widget: document.getElementById("widget"),
      brandLink: document.getElementById("brandLink"),
      brandLogo: document.getElementById("brandLogo")
    };

    function parseCsvLine(line) {
      const out = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          out.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      out.push(current);
      return out.map(v => v.trim());
    }

    function parseCsv(text) {
      const lines = text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);

      if (lines.length < 2) {
        throw new Error("The sheet needs a header row and at least one data row.");
      }

      const headers = parseCsvLine(lines[0]);
      const rows = lines.slice(1).map(parseCsvLine);

      return rows.map(row => {
        const entry = {};
        headers.forEach((header, index) => {
          entry[header] = row[index] ?? "";
        });
        return entry;
      });
    }

    function clamp(num, min, max) {
      return Math.min(Math.max(num, min), max);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("en-US").format(value);
    }

    function renderTicks(goal) {
      els.ticks.innerHTML = "";
      const steps = 4;
      for (let i = 0; i <= steps; i++) {
        const pct = (i / steps) * 100;
        const value = Math.round((goal / steps) * i);

        // Skip the top (goal) tick
        if (i === steps) continue;

        const tick = document.createElement("div");
        tick.className = "tick";
        tick.style.bottom = `${pct}%`;
        tick.textContent = formatNumber(value);
        els.ticks.appendChild(tick);
      }
    }

    function formatUpdatedLabel(value) {
      if (!value) return "Updated today";

      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) {
        return `Updated ${value}`;
      }

      return `Updated ${parsed.toLocaleDateString("en-US", {
        month: "short",
        day: "numeric"
      })}`;
    }

    function render(data) {
      const current = Number(data[CONFIG.columns.current] || 0);
      const goal = Number(data[CONFIG.columns.goal] || 100);
      const headline = data[CONFIG.columns.headline] || CONFIG.title;
      const subhead = data[CONFIG.columns.subhead] || CONFIG.subtitle;
      const ctaUrl = data[CONFIG.columns.ctaUrl] || CONFIG.subscribeUrl;
      const ctaText = data[CONFIG.columns.ctaText] || "Become a subscriber";
      const updatedAt = data[CONFIG.columns.updatedAt] || "";

      const percent = goal > 0 ? clamp((current / goal) * 100, 0, 100) : 0;
      const remaining = Math.max(goal - current, 0);
      const isNearGoal = remaining > 0 && remaining <= 10;
      const isGoalReached = current >= goal;

      els.currentValue.textContent = formatNumber(current);
      els.goalValue.textContent = formatNumber(goal);
      els.percentValue.textContent = `${Math.round(percent)}%`;
      els.footerNote.textContent = remaining > 0
        ? `${formatNumber(remaining)} subscriber${remaining === 1 ? "" : "s"} to go.`
        : `Goal reached${current > goal ? ` — now at ${formatNumber(current)}.` : "."}`;
      els.leftBadge.innerHTML = isGoalReached
        ? `<strong>${formatNumber(current)}</strong> total`
        : `<strong>${formatNumber(remaining)}</strong> left`;
      els.updatedBadge.textContent = formatUpdatedLabel(updatedAt);
      els.brandLink.href = CONFIG.brandUrl;
      els.brandLogo.src = CONFIG.brandLogoUrl;
      els.brandLogo.alt = "Vallejo Sun";
      els.headline.textContent = headline;
      els.subhead.textContent = subhead;
      els.ctaLink.href = ctaUrl;
      els.ctaLink.textContent = ctaText;

      els.widget.classList.toggle("near-goal", isNearGoal);
      els.widget.classList.toggle("goal-reached", isGoalReached);

      requestAnimationFrame(() => {
        els.thermoFill.style.height = `${percent}%`;
        els.barFill.style.width = `${percent}%`;
      });

      renderTicks(goal);
    }

    function showError(message) {
      els.errorBox.hidden = false;
      els.errorBox.textContent = message;
    }

    async function loadData() {
      if (!CONFIG.sheetCsvUrl || CONFIG.sheetCsvUrl.includes("PASTE_YOUR_PUBLISHED_CSV_URL_HERE")) {
        showError("Add your Google Sheets published CSV URL in the CONFIG section.");
        render({ current: 0, goal: 100 });
        return;
      }

      try {
        const response = await fetch(CONFIG.sheetCsvUrl, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Could not load sheet data (${response.status}).`);
        }

        const text = await response.text();
        const rows = parseCsv(text);
        const row = rows[CONFIG.dataRowIndex];

        if (!row) {
          throw new Error("The selected data row does not exist in the sheet.");
        }

        render(row);
      } catch (error) {
        showError(error.message || "Could not load progress data.");
        render({ current: 0, goal: 100 });
      }
    }

    function applyLayoutMode() {
      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode");
      const widget = document.getElementById("widget");

      if (mode === "horizontal") {
        widget.classList.add("ad-horizontal");
      } else if (mode === "vertical") {
        widget.classList.add("ad-vertical");
      }
    }

    applyLayoutMode();
    loadData();
  </script>
</body>
</html>
