<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vallejo Sun Membership Progress</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --border: #000000;
      --text: #000000;
      --muted: #555555;
      --accent: #fed700;
      --accent-dark: #e6c200;
      --track: #eeeeee;
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: auto;
      overflow: auto;
      font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background: transparent;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .widget {
      width: 100%;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .article {
      max-width: 820px;
      margin: 24px auto;
    }

    .brand-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-logo {
      max-width: 220px;
      max-height: 48px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1 { font-size: 32px; margin: 0; }
    .subhead { color: var(--muted); }

    .stats {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
    }

    .stat { border:1px solid var(--border); padding:10px; }
    .stat-value { font-size:28px; font-weight:900; }

    .progress-bar {
      height: 20px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      border:1px solid var(--border);
    }

    .progress-bar-fill {
      height:100%;
      width:0%;
      background: linear-gradient(90deg,#fed700,#fff3a0);
      box-shadow:0 0 12px rgba(254,215,0,.5);
      transition: width .8s ease;
    }

    .progress-caption {
      display:flex;
      justify-content:space-between;
      font-size:13px;
      color:var(--muted);
    }

    .meta-row {
      display:flex;
      gap:10px;
    }

    .badge {
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }

    .cta {
      background:var(--accent);
      color:#000;
      padding:10px 14px;
      text-decoration:none;
      font-weight:900;
      border:1px solid var(--border);
      border-radius:999px;
    }

    /* ad modes */
    .ad-horizontal { width:970px; height:250px; overflow:hidden; }
    .ad-vertical { width:300px; height:600px; overflow:hidden; }
    .ad-wide { width:1200px; height:300px; overflow:hidden; }
  </style>
</head>
<body>
<section class="widget" id="widget">
  <div class="brand-row">
    <a href="https://www.vallejosun.com" target="_blank">
      <img class="brand-logo" id="brandLogo" />
    </a>
    <div class="eyebrow">Spring Membership Drive</div>
  </div>

  <h1 id="headline"></h1>
  <p class="subhead" id="subhead"></p>

  <div class="meta-row">
    <div class="badge" id="daysLeft"></div>
    <div class="badge" id="updated"></div>
  </div>

  <div class="stats">
    <div class="stat"><div>Members</div><div id="current"></div></div>
    <div class="stat"><div>Goal</div><div id="goal"></div></div>
    <div class="stat"><div>Progress</div><div id="percent"></div></div>
  </div>

  <div class="progress-bar"><div id="bar" class="progress-bar-fill"></div></div>

  <div class="progress-caption">
    <span id="remaining"></span>
    <span id="summary"></span>
  </div>

  <a id="cta" class="cta" target="_blank"></a>
</section>

<script>
const CONFIG = {
  sheetCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHfbZ_8WikIY9OUJ17gOMhZfJJVIRNABlskTF5Soumh_vmaIe_lW36OOvBq-tkBUFTtDy25pN7Mh58/pub?output=csv",
  brandLogoUrl: "https://www.vallejosun.com/content/images/2026/03/VallejoSunlogoidea6-1000px-transparent.png",
  subscribeUrl: "https://www.vallejosun.com/membership"
};

function getParam(name) {
  const p = new URLSearchParams(location.search);
  return p.get(name);
}

function format(n) {
  return new Intl.NumberFormat().format(n);
}

function daysLeft() {
  const now = new Date();
  const end = new Date(now.getFullYear(), 4, 0);
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const d = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
  if (d <= 0) return "Last day";
  if (d === 1) return "1 day left";
  return d + " days left";
}

function parseCsvLine(line) {
  const out = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    const next = line[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === "," && !inQuotes) {
      out.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  out.push(current);
  return out.map(v => v.trim());
}

async function load() {
  const previewCurrent = getParam("preview_current");
  const previewGoal = getParam("preview_goal");

  let current = previewCurrent !== null ? Number(previewCurrent) : null;
  let goal = previewGoal !== null ? Number(previewGoal) : null;

  if (current === null && CONFIG.sheetCsvUrl && !CONFIG.sheetCsvUrl.includes("PASTE")) {
    const res = await fetch(CONFIG.sheetCsvUrl, { cache: "no-store" });
    const text = await res.text();

    const lines = text.split(/\r?\n/).filter(Boolean);
    const headers = parseCsvLine(lines[0]);
    const row = parseCsvLine(lines[1] || "");

    const map = Object.fromEntries(headers.map((h, i) => [h, row[i] ?? ""]));

    current = Number(map.current) || 0;
    goal = Number(map.goal) || 100;
  }

  if (current === null) current = 0;
  if (goal === null || !Number.isFinite(goal) || goal <= 0) goal = 100;

  const percent = Math.max(0, Math.min(100, Math.round((current / goal) * 100)));
  const remaining = Math.max(goal - current, 0);

  document.getElementById("current").textContent = format(current);
  document.getElementById("goal").textContent = format(goal);
  document.getElementById("percent").textContent = percent + "%";
  document.getElementById("remaining").textContent = remaining + " members to go";
  document.getElementById("summary").textContent = current + " of " + goal;
  document.getElementById("bar").style.width = percent + "%";

  document.getElementById("headline").textContent = "Help keep the Sun shining on Vallejo";
  document.getElementById("subhead").textContent = "Join Vallejo Sun members supporting local journalism";

  document.getElementById("cta").textContent = "Become a member";
  document.getElementById("cta").href = CONFIG.subscribeUrl;

  document.getElementById("brandLogo").src = CONFIG.brandLogoUrl;
  document.getElementById("daysLeft").textContent = daysLeft();
  document.getElementById("updated").textContent = "Updated today";
}

function mode() {
  const m = getParam("mode");
  if (m) {
    document.getElementById("widget").classList.add("ad-" + m);
  } else {
    document.getElementById("widget").classList.add("article");
  }
}

mode();
load().catch(err => {
  console.error(err);
  document.getElementById("headline").textContent = "Could not load membership progress";
  document.getElementById("subhead").textContent = err.message;
});
</script>
</body>
</html>
