<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vallejo Sun Membership Progress</title>
  <style>
    :root {
      --card: #ffffff;
      --border: #000000;
      --text: #000000;
      --muted: #555555;
      --accent: #fed700;
      --accent-dark: #e6c200;
      --track: #eeeeee;
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: auto;
      overflow: auto;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: transparent;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .widget {
      width: 100%;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
    }

    .panel {
      width: 100%;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .article {
      max-width: 820px;
      margin: 24px auto;
    }

    .article .panel {
      padding: 20px;
    }

    .brand-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      text-decoration: none;
    }

    .brand-logo {
      display: block;
      max-width: 220px;
      max-height: 48px;
      width: auto;
      height: auto;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: right;
      white-space: nowrap;
    }

    h1 {
      font-size: 32px;
      line-height: 1.02;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .subhead {
      color: var(--muted);
      margin: 0;
      font-size: 16px;
      line-height: 1.3;
    }

    .meta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      background: #fff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 12px;
      background: #fff;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
    }

    .progress-bar {
      height: 20px;
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #fed700 0%, #fff3a0 100%);
      box-shadow: 0 0 12px rgba(254,215,0,0.45);
      transition: width 0.8s ease;
      border-radius: 999px;
    }

    .progress-caption {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      flex-wrap: wrap;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: flex-start;
      background: var(--accent);
      color: #000;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 900;
      border: 1px solid var(--border);
      border-radius: 999px;
      white-space: nowrap;
    }

    .cta:hover {
      background: var(--accent-dark);
    }

    .ad-horizontal {
      width: 970px;
      height: 250px;
      overflow: hidden;
    }

    .ad-horizontal .panel {
      height: 250px;
      padding: 14px 16px;
      justify-content: flex-start;
      gap: 8px;
    }

    .ad-horizontal .brand-row {
      align-items: flex-start;
      gap: 22px;
      margin-bottom: 2px;
    }

    .ad-horizontal .brand-logo {
      max-width: 168px;
      max-height: 34px;
    }

    .ad-horizontal .eyebrow {
      font-size: 10px;
      margin-top: 6px;
    }

    .ad-horizontal h1 {
      font-size: 27px;
      line-height: 0.98;
    }

    .ad-horizontal .subhead {
      font-size: 14px;
      line-height: 1.2;
    }

    .ad-horizontal .meta-row {
      gap: 8px;
    }

    .ad-horizontal .badge {
      font-size: 11px;
      padding: 5px 9px;
    }

    .ad-horizontal .stats {
      gap: 8px;
    }

    .ad-horizontal .stat {
      padding: 8px 9px;
    }

    .ad-horizontal .stat-label {
      font-size: 9px;
      margin-bottom: 4px;
    }

    .ad-horizontal .stat-value {
      font-size: 22px;
    }

    .ad-horizontal .progress-bar {
      height: 14px;
      margin-top: 2px;
    }

    .ad-horizontal .progress-caption {
      font-size: 11px;
      gap: 8px;
    }

    .ad-horizontal .cta {
      padding: 8px 12px;
      font-size: 12px;
      margin-top: 2px;
    }

    .ad-vertical {
      width: 300px;
      height: 600px;
      overflow: hidden;
    }

    .ad-vertical .panel {
      height: 600px;
      padding: 16px 14px;
      gap: 12px;
    }

    .ad-vertical .brand-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .ad-vertical .brand-logo {
      max-width: 180px;
      max-height: 40px;
    }

    .ad-vertical .eyebrow {
      text-align: left;
      font-size: 11px;
    }

    .ad-vertical h1 {
      font-size: 30px;
      line-height: 0.98;
    }

    .ad-vertical .subhead {
      font-size: 15px;
      line-height: 1.25;
    }

    .ad-vertical .stats {
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .ad-vertical .progress-bar {
      height: 16px;
    }

    .ad-vertical .progress-caption {
      font-size: 12px;
      flex-direction: column;
      gap: 4px;
    }

    .ad-vertical .cta {
      width: 100%;
      align-self: stretch;
    }

    .ad-wide {
      width: 1200px;
      height: 300px;
      overflow: hidden;
    }

    .ad-wide .panel {
      height: 300px;
      padding: 16px 20px;
      justify-content: flex-start;
      gap: 10px;
    }

    .ad-wide .brand-row {
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 2px;
    }

    .ad-wide .brand-logo {
      max-width: 190px;
      max-height: 38px;
    }

    .ad-wide .eyebrow {
      font-size: 11px;
      margin-top: 7px;
    }

    .ad-wide h1 {
      font-size: 34px;
      line-height: 1;
    }

    .ad-wide .subhead {
      font-size: 15px;
      line-height: 1.22;
      max-width: 78ch;
    }

    .ad-wide .badge {
      font-size: 12px;
      padding: 5px 10px;
    }

    .ad-wide .stats {
      gap: 10px;
    }

    .ad-wide .stat {
      padding: 9px 10px;
    }

    .ad-wide .stat-value {
      font-size: 24px;
    }

    .ad-wide .progress-bar {
      height: 16px;
      margin-top: 2px;
    }

    .ad-wide .progress-caption {
      font-size: 12px;
    }

    .ad-wide .cta {
      padding: 9px 13px;
      font-size: 13px;
    }

    @media (max-width: 720px) {
      .panel {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      .brand-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .eyebrow {
        text-align: left;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .progress-caption {
        flex-direction: column;
      }

      .cta {
        width: 100%;
        align-self: stretch;
      }
    }
  </style>
</head>
<body>
<section class="widget" id="widget">
  <div class="panel">
    <div class="brand-row">
      <a class="brand-link" href="https://www.vallejosun.com" target="_blank" rel="noopener noreferrer">
        <img class="brand-logo" id="brandLogo" alt="Vallejo Sun" />
      </a>
      <div class="eyebrow">Spring Membership Drive</div>
    </div>

    <h1 id="headline"></h1>
    <p class="subhead" id="subhead"></p>

    <div class="meta-row">
      <div class="badge" id="daysLeft"></div>
      <div class="badge" id="updated"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Members</div>
        <div class="stat-value" id="current"></div>
      </div>
      <div class="stat">
        <div class="stat-label">Goal</div>
        <div class="stat-value" id="goal"></div>
      </div>
      <div class="stat">
        <div class="stat-label">Progress</div>
        <div class="stat-value" id="percent"></div>
      </div>
    </div>

    <div class="progress-bar"><div id="bar" class="progress-bar-fill"></div></div>

    <div class="progress-caption">
      <span id="remaining"></span>
      <span id="summary"></span>
    </div>

    <a id="cta" class="cta" target="_blank" rel="noopener noreferrer"></a>
  </div>
</section>

<script>
const CONFIG = {
  sheetCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHfbZ_8WikIY9OUJ17gOMhZfJJVIRNABlskTF5Soumh_vmaIe_lW36OOvBq-tkBUFTtDy25pN7Mh58/pub?output=csv",
  brandLogoUrl: "https://www.vallejosun.com/content/images/2026/03/VallejoSunlogoidea6-1000px-transparent.png",
  subscribeUrl: "https://www.vallejosun.com/membership"
};

function getParam(name) {
  const p = new URLSearchParams(location.search);
  return p.get(name);
}

function format(n) {
  return new Intl.NumberFormat("en-US").format(n);
}

function daysLeft() {
  const now = new Date();
  const end = new Date(now.getFullYear(), 4, 0);
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const d = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
  if (d <= 0) return "Last day";
  if (d === 1) return "1 day left";
  return d + " days left";
}

function parseCsvLine(line) {
  const out = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    const next = line[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === "," && !inQuotes) {
      out.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  out.push(current);
  return out.map(v => v.trim());
}

function getDefaultCopy(mode) {
  if (mode === "horizontal") {
    return {
      headline: "Keep the Sun shining",
      subhead: "Join 100 Vallejo members this spring",
      cta: "Become a member"
    };
  }

  if (mode === "vertical") {
    return {
      headline: "Help keep the Sun shining on Vallejo",
      subhead: "Join local members supporting independent news",
      cta: "Join as a member"
    };
  }

  if (mode === "wide") {
    return {
      headline: "Power the Vallejo Sun this spring",
      subhead: "Become one of 100 members supporting local reporting",
      cta: "Become a member"
    };
  }

  return {
    headline: "Help keep the Sun shining on Vallejo",
    subhead: "Join Vallejo Sun members supporting local journalism",
    cta: "Become a member"
  };
}

async function load() {
  const mode = getParam("mode") || "article";
  const previewCurrent = getParam("preview_current");
  const previewGoal = getParam("preview_goal");

  let current = previewCurrent !== null ? Number(previewCurrent) : null;
  let goal = previewGoal !== null ? Number(previewGoal) : null;

  if (current === null && CONFIG.sheetCsvUrl && !CONFIG.sheetCsvUrl.includes("PASTE")) {
    const res = await fetch(CONFIG.sheetCsvUrl, { cache: "no-store" });
    const text = await res.text();

    const lines = text.split(/
?
/).filter(Boolean);
    const headers = parseCsvLine(lines[0] || "");
    const row = parseCsvLine(lines[1] || "");
    const map = Object.fromEntries(headers.map((h, i) => [h, row[i] ?? ""]));

    current = Number(map.current) || 0;
    goal = Number(map.goal) || 100;
  }

  if (current === null || !Number.isFinite(current)) current = 0;
  if (goal === null || !Number.isFinite(goal) || goal <= 0) goal = 100;

  const percent = Math.max(0, Math.min(100, Math.round((current / goal) * 100)));
  const remaining = Math.max(goal - current, 0);
  const defaults = getDefaultCopy(mode);

  document.getElementById("current").textContent = format(current);
  document.getElementById("goal").textContent = format(goal);
  document.getElementById("percent").textContent = percent + "%";
  document.getElementById("remaining").textContent = remaining + " member" + (remaining === 1 ? "" : "s") + " to go";
  document.getElementById("summary").textContent = format(current) + " of " + format(goal);
  document.getElementById("bar").style.width = percent + "%";

  document.getElementById("headline").textContent = defaults.headline;
  document.getElementById("subhead").textContent = defaults.subhead;
  document.getElementById("cta").textContent = defaults.cta;
  document.getElementById("cta").href = CONFIG.subscribeUrl;
  document.getElementById("brandLogo").src = CONFIG.brandLogoUrl;
  document.getElementById("daysLeft").textContent = daysLeft();
  document.getElementById("updated").textContent = "Updated today";
}

function applyMode() {
  const m = getParam("mode");
  const widget = document.getElementById("widget");

  if (m === "horizontal") {
    widget.classList.add("ad-horizontal");
  } else if (m === "vertical") {
    widget.classList.add("ad-vertical");
  } else if (m === "wide") {
    widget.classList.add("ad-wide");
  } else {
    widget.classList.add("article");
  }
}

applyMode();
load().catch((err) => {
  console.error(err);
  document.getElementById("headline").textContent = "Could not load membership progress";
  document.getElementById("subhead").textContent = err.message;
});
</script>
</body>
</html>
