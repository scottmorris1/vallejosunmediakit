<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vallejo Sun Membership Progress</title>
  <style>
    :root {
      --card: #ffffff;
      --border: #000000;
      --text: #000000;
      --muted: #555555;
      --accent: #fed700;
      --accent-dark: #e6c200;
      --track: #eeeeee;
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: transparent;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .widget {
      width: 100%;
      background: transparent;
      padding: 0;
    }

    .panel {
      width: 100%;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .article {
      max-width: 820px;
      margin: 24px auto;
    }

    .brand-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      min-width: 0;
    }

    .brand-logo {
      display: block;
      width: auto;
      height: auto;
      max-width: 220px;
      max-height: 48px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.02;
      letter-spacing: -0.02em;
    }

    .subhead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.3;
    }

    .meta-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
    }

    .progress-bar {
      width: 100%;
      height: 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--track);
      overflow: hidden;
    }

    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #fed700 0%, #fff3a0 100%);
      box-shadow: 0 0 12px rgba(254,215,0,0.45);
      transition: width 0.8s ease;
      border-radius: 999px;
    }

    .progress-caption {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: flex-start;
      min-height: 40px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--accent);
      color: #000000;
      text-decoration: none;
      font-weight: 900;
      white-space: nowrap;
    }

    .cta:hover {
      background: var(--accent-dark);
    }

    .ad-horizontal {
      width: 970px;
      height: 250px;
      overflow: hidden;
    }

    .ad-horizontal .panel {
      height: 250px;
      padding: 14px 16px;
      gap: 8px;
      justify-content: flex-start;
      border-radius: 0;
    }

    .ad-horizontal .brand-row {
      align-items: flex-start;
      gap: 22px;
    }

    .ad-horizontal .brand-logo {
      max-width: 165px;
      max-height: 34px;
    }

    .ad-horizontal .eyebrow {
      font-size: 10px;
      margin-top: 6px;
    }

    .ad-horizontal h1 {
      font-size: 27px;
      line-height: 0.98;
    }

    .ad-horizontal .subhead {
      font-size: 14px;
      line-height: 1.18;
    }

    .ad-horizontal .badge {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 11px;
    }

    .ad-horizontal .stat {
      padding: 8px 9px;
    }

    .ad-horizontal .stat-label {
      font-size: 9px;
      margin-bottom: 4px;
    }

    .ad-horizontal .stat-value {
      font-size: 22px;
    }

    .ad-horizontal .progress-bar {
      height: 14px;
    }

    .ad-horizontal .progress-caption {
      font-size: 11px;
      gap: 8px;
    }

    .ad-horizontal .cta {
      display: none;
    }

    .ad-vertical {
      width: 300px;
      height: 600px;
      overflow: hidden;
    }

    .ad-vertical .panel {
      height: 600px;
      padding: 16px 14px;
      gap: 12px;
    }

    .ad-vertical .brand-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .ad-vertical .brand-logo {
      max-width: 180px;
      max-height: 40px;
    }

    .ad-vertical .eyebrow {
      font-size: 11px;
    }

    .ad-vertical h1 {
      font-size: 30px;
      line-height: 0.98;
    }

    .ad-vertical .subhead {
      font-size: 15px;
      line-height: 1.24;
    }

    .ad-vertical .stats {
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .ad-vertical .progress-bar {
      height: 16px;
    }

    .ad-vertical .progress-caption {
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
    }

    .ad-vertical .cta {
      display: none;
    }

    .ad-wide {
      width: 1200px;
      height: 300px;
      overflow: hidden;
    }

    .ad-wide .panel {
      height: 300px;
      padding: 16px 20px;
      gap: 10px;
      justify-content: flex-start;
      border-radius: 0;
    }

    .ad-wide .brand-row {
      align-items: flex-start;
      gap: 24px;
    }

    .ad-wide .brand-logo {
      max-width: 190px;
      max-height: 38px;
    }

    .ad-wide .eyebrow {
      font-size: 11px;
      margin-top: 7px;
    }

    .ad-wide h1 {
      font-size: 34px;
      line-height: 1;
    }

    .ad-wide .subhead {
      font-size: 15px;
      line-height: 1.2;
      max-width: 78ch;
    }

    .ad-wide .badge {
      min-height: 30px;
      padding: 5px 9px;
      font-size: 12px;
    }

    .ad-wide .stat {
      padding: 9px 10px;
    }

    .ad-wide .stat-value {
      font-size: 24px;
    }

    .ad-wide .progress-bar {
      height: 16px;
    }

    .ad-wide .progress-caption {
      font-size: 12px;
    }

    .ad-wide .cta {
      display: none;
    }

    @media (max-width: 720px) {
      .panel {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      .brand-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .progress-caption {
        flex-direction: column;
      }

      .cta {
        width: 100%;
        align-self: stretch;
      }
    }
  </style>
</head>
<body>
  <section class="widget" id="widget">
    <div class="panel">
      <div class="brand-row">
        <a class="brand-link" id="brandLink" href="https://www.vallejosun.com" target="_blank" rel="noopener noreferrer">
          <img class="brand-logo" id="brandLogo" alt="Vallejo Sun" />
        </a>
        <div class="eyebrow">Spring Membership Drive</div>
      </div>

      <h1 id="headline"></h1>
      <p class="subhead" id="subhead"></p>

      <div class="meta-row">
        <div class="badge" id="daysLeft"></div>
        <div class="badge" id="updated"></div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Members</div>
          <div class="stat-value" id="current"></div>
        </div>
        <div class="stat">
          <div class="stat-label">Goal</div>
          <div class="stat-value" id="goal"></div>
        </div>
        <div class="stat">
          <div class="stat-label">Progress</div>
          <div class="stat-value" id="percent"></div>
        </div>
      </div>

      <div class="progress-bar">
        <div id="bar" class="progress-bar-fill"></div>
      </div>

      <div class="progress-caption">
        <span id="remaining"></span>
        <span id="summary"></span>
      </div>

      <a id="cta" class="cta" target="_blank" rel="noopener noreferrer"></a>
    </div>
  </section>

  <script>
    const CONFIG = {
      sheetCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSHfbZ_8WikIY9OUJ17gOMhZfJJVIRNABlskTF5Soumh_vmaIe_lW36OOvBq-tkBUFTtDy25pN7Mh58/pub?output=csv",
      brandLogoUrl: "https://www.vallejosun.com/content/images/2026/03/VallejoSunlogoidea6-1000px-transparent.png",
      subscribeUrl: "https://www.vallejosun.com/membership"
    };

    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function format(n) {
      return new Intl.NumberFormat("en-US").format(n);
    }

    function getDefaults(mode) {
      if (mode === "horizontal") {
        return {
          headline: "Keep the Sun shining",
          subhead: "Join 100 Vallejo members this spring",
          cta: "Become a member"
        };
      }
      if (mode === "vertical") {
        return {
          headline: "Help keep the Sun shining on Vallejo",
          subhead: "Join local members supporting independent news",
          cta: "Join as a member"
        };
      }
      if (mode === "wide") {
        return {
          headline: "Power the Vallejo Sun this spring",
          subhead: "Become one of 100 members supporting local reporting",
          cta: "Become a member"
        };
      }
      return {
        headline: "Help keep the Sun shining on Vallejo",
        subhead: "Join Vallejo Sun members supporting local journalism",
        cta: "Become a member"
      };
    }

    function pickModeValue(map, baseKey, mode) {
      const suffixMap = {
        horizontal: "_horizontal",
        vertical: "_vertical",
        wide: "_wide"
      };

      const suffix = suffixMap[mode];
      if (suffix) {
        const modeKey = baseKey + suffix;
        if (map[modeKey]) return map[modeKey];
      }

      return map[baseKey] || "";
    }

function daysLeft() {
  const now = new Date();

  const laNow = new Date(
    now.toLocaleString("en-US", { timeZone: "America/Los_Angeles" })
  );

  const year = laNow.getFullYear();
  const month = laNow.getMonth();
  const day = laNow.getDate();

  const todayLa = new Date(year, month, day);
  const endLa = new Date(year, 4, 0); // April 30

  const diff = Math.ceil((endLa - todayLa) / (1000 * 60 * 60 * 24));

  if (diff <= 0) return "Last day";
  if (diff === 1) return "1 day left";
  return diff + " days left";
}

    function parseCsvLine(line) {
      const values = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          values.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      values.push(current);
      return values.map(v => v.trim());
    }

    async function load() {
      const mode = getParam("mode") || "article";
      const defaults = getDefaults(mode);
      const previewCurrent = getParam("preview_current");
      const previewGoal = getParam("preview_goal");

      let current = previewCurrent !== null ? Number(previewCurrent) : null;
      let goal = previewGoal !== null ? Number(previewGoal) : null;
      let map = {};

      if (current === null && CONFIG.sheetCsvUrl && !CONFIG.sheetCsvUrl.includes("PASTE")) {
        const response = await fetch(CONFIG.sheetCsvUrl, { cache: "no-store" });
        const text = await response.text();
        const lines = text.split(/\r?\n/).filter(Boolean);
        const headers = parseCsvLine(lines[0] || "");
        const row = parseCsvLine(lines[1] || "");
        map = Object.fromEntries(headers.map((h, i) => [h, row[i] ?? ""]));
        current = Number(map.current) || 0;
        goal = Number(map.goal) || 100;
      }

      if (current === null || !Number.isFinite(current)) current = 0;
      if (goal === null || !Number.isFinite(goal) || goal <= 0) goal = 100;

      const percent = Math.max(0, Math.min(100, Math.round((current / goal) * 100)));
      const remaining = Math.max(goal - current, 0);

      document.getElementById("current").textContent = format(current);
      document.getElementById("goal").textContent = format(goal);
      document.getElementById("percent").textContent = percent + "%";
      document.getElementById("remaining").textContent = remaining + " member" + (remaining === 1 ? "" : "s") + " to go";
      document.getElementById("summary").textContent = format(current) + " of " + format(goal);
      document.getElementById("bar").style.width = percent + "%";

      const headline = pickModeValue(map, "headline", mode) || defaults.headline;
      const subhead = pickModeValue(map, "subhead", mode) || defaults.subhead;
      const ctaText = pickModeValue(map, "cta_text", mode) || defaults.cta;
      const ctaUrl = pickModeValue(map, "cta_url", mode) || CONFIG.subscribeUrl;

      document.getElementById("headline").textContent = headline;
      document.getElementById("subhead").textContent = subhead;
      document.getElementById("cta").textContent = ctaText;
      document.getElementById("cta").href = ctaUrl;
      document.getElementById("brandLogo").src = CONFIG.brandLogoUrl;
      document.getElementById("brandLink").href = "https://www.vallejosun.com";
      document.getElementById("daysLeft").textContent = daysLeft();
      document.getElementById("updated").textContent = "Updated today";
    }

    function applyMode() {
      const mode = getParam("mode");
      const widget = document.getElementById("widget");
      if (mode === "horizontal") {
        widget.classList.add("ad-horizontal");
      } else if (mode === "vertical") {
        widget.classList.add("ad-vertical");
      } else if (mode === "wide") {
        widget.classList.add("ad-wide");
      } else {
        widget.classList.add("article");
      }
    }

    applyMode();
    load().catch((error) => {
      console.error(error);
      document.getElementById("headline").textContent = "Could not load membership progress";
      document.getElementById("subhead").textContent = error.message;
    });
  </script>
</body>
</html>
